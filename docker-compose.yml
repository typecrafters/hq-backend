services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    profiles: [prod, dev]
    restart: unless-stopped
    environment:
      POSTGRES_DB: hq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Mailpit (SMTP catcher for dev) ───────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    profiles: [prod, dev]
    restart: unless-stopped
    ports:
      - "11025:1025"
      - "9025:8025"

  # ── Backend — production build ───────────────────────────────────────────
  #   docker compose --profile prod up
  backend:
    profiles: [prod]
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: hq
      SMTP_HOST: mailpit
      SMTP_PORT: "11025"
      FRONTEND_URL: "http://localhost:8000"

  # ── Backend — development with hot reload ────────────────────────────────
  #   docker compose --profile dev up
  backend-dev:
    profiles: [dev]
    build:
      context: .
      target: development
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount EVERYTHING so uvicorn --reload detects any change.
      # .dockerignore prevents unwanted host files from leaking in.
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Force polling because Docker Desktop on Windows doesn't forward
      # inotify events from the host into the container via bind mounts.
      WATCHFILES_FORCE_POLLING: "true"

      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: hq
      SMTP_HOST: mailpit
      SMTP_PORT: "11025"
      FRONTEND_URL: "http://localhost:8000"

volumes:
  pgdata:
